<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Контакты — AnyPrice</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <!-- шапка такая же -->
</header>

<main class="pt-40 pb-32 px-6 lg:px-12 max-w-3xl mx-auto text-center">
  <h1 class="text-7xl lg:text-9xl font-black mb-16 animate-on-scroll">КОНТАКТЫ</h1>

  <p class="text-2xl text-gray-300 mb-12 animate-on-scroll">
    Напишите нам — ответим в течение 1–2 часов
  </p>

  <div class="space-y-8 max-w-md mx-auto animate-on-scroll">
    <a href="https://t.me/anyprice_support" class="block bg-zinc-900 border border-zinc-700 py-6 text-2xl font-bold hover:bg-zinc-800 transition">
      Telegram: @anyprice_support
    </a>
    <a href="https://instagram.com/anyprice" class="block bg-zinc-900 border border-zinc-700 py-6 text-2xl font-bold hover:bg-zinc-800 transition">
      Instagram: @anyprice
    </a>
    <a href="mailto:hello@anyprice.ru" class="block bg-zinc-900 border border-zinc-700 py-6 text-2xl font-bold hover:bg-zinc-800 transition">
      Email: hello@anyprice.ru
    </a>
  </div>
</main>

<footer>
  © 2026 AnyPrice. Все цены уникальны навсегда.
</footer>

<script>
// анимация
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) entry.target.classList.add('visible');
  });
}, { threshold: 0.1 });

document.querySelectorAll('.animate-on-scroll').forEach(el => observer.observe(el));
</script>
</body>
</html>
